<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raisin Words - Join Game</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            scrollbar-width: none;
            /* Firefox */
        }

        ::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Join Screen */
        .screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        #game-screen {
            padding: 10px;
            gap: 10px;
        }

        #join-screen {
            padding: 20px;
            padding-bottom: 0;
        }

        .join-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .join-button-container {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(to top, #0f172a 80%, transparent);
            z-index: 10;
        }

        #join-btn {
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #join-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
            color: #fbbf24;
            font-weight: 900;
            text-transform: uppercase;
        }

        h2 {
            font-size: 16px;
            margin: 0;
            color: #cbd5e1;
            text-align: center;
        }

        input {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            width: 100%;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #fbbf24;
        }

        button {
            background: #fbbf24;
            color: #78350f;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Slider Styles */
        .avatar-slider-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .nav-arrow {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: absolute;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-arrow:hover {
            opacity: 1;
            background: rgba(251, 191, 36, 0.8);
        }

        .nav-arrow.left {
            left: -10px;
        }

        .nav-arrow.right {
            right: -10px;
        }

        .avatar-grid {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px 5px;
            scroll-behavior: smooth;
            /* Smooth for clicks, removed by JS for drag if needed */
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            cursor: grab;
            /* Cursor hint for desktop */
            width: 100%;
        }

        .avatar-grid:active {
            cursor: grabbing;
        }

        .avatar-grid::-webkit-scrollbar {
            display: none;
            /* Hide scrollbar Chrome/Safari */
        }

        .avatar-option {
            flex: 0 0 70px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid transparent;
            cursor: pointer;
            background: #1e293b;
        }

        .avatar-option.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 10px #fbbf24;
        }

        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Game Screen */
        .coordinates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .coord-btn {
            background: #334155;
            color: white;
            padding: 20px;
            font-size: 20px;
            border-radius: 8px;
        }

        .big-input {
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: auto;
        }

        .profile-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e293b;
            padding: 10px;
            border-radius: 12px;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: #334155;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-weight: bold;
            font-size: 18px;
        }

        .camera-section {
            display: none !important; /* disabled for remote play */
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .camera-circle-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #334155;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #475569;
            overflow: hidden;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .camera-circle-btn.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            transform: scale(1.05);
        }

        .camera-label {
            font-weight: bold;
            color: #fbbf24;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Avatar Hint */
        .avatar-hint {
            text-align: center;
            color: #94a3b8;
            margin: 0 0 15px 0;
            font-size: 13px;
            font-style: italic;
        }

        #debug-overlay {
            position: fixed;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: lime;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            pointer-events: none;
            z-index: 9999;
            max-width: 50vw;
            white-space: pre-wrap;
            display: none;
            /* Hidden by default, toggle via console or tap? */
        }

        .battle-buttons {
            display: none !important; /* disabled for remote play */
            gap: 12px;
            margin-left: auto;
        }

        .battle-circle-btn {
            background: #334155;
            color: white;
            border: 2px solid #475569;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
            padding: 0;
            outline: none;
        }

        .battle-circle-btn:active {
            transform: scale(0.9);
        }

        .battle-circle-btn.disabled {
            opacity: 0.4;
            filter: grayscale(1);
            pointer-events: none;
        }

        .battle-circle-btn .effect-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1e293b;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10005;
            display: flex;
            align-items: flex-end;
            /* pop up from bottom */
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
            text-align: center;
        }

        .target-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .target-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .target-btn:active {
            background: #475569;
        }

        .close-modal-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            width: 100%;
            cursor: pointer;
        }
    </style>
    <style>
        /* GRID STYLES */
        #grid-wrapper {
            display: inline-grid;
            gap: 0;
            margin: 0 auto;
            background: white;
            border: 2px solid #1e293b;
            padding: 2px;
            /* Scale better: Use almost full width on small screens, but respect height to avoid scroll */
            width: 100%;
            max-width: min(98vw, calc(100vh - 300px));
            aspect-ratio: 1;
            /* Keep it square */
        }

        .coord-label {
            background: #334155;
            /* Dark background */
            color: #fbbf24;
            /* Gold text */
            font-size: clamp(12px, 3vw, 16px);
            /* Slightly larger */
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            padding: 0;
            border: 1px solid #1e293b;
        }

        .coord-label-top {
            grid-row: 1;
            border-bottom: 2px solid #fbbf24;
        }

        .coord-label-left {
            grid-column: 1;
            border-right: 2px solid #fbbf24;
        }

        .grid-cell {
            background: white;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(14px, 5vw, 24px);
            /* Larger letters */
            user-select: none;
            cursor: pointer;
            transition: background 0.15s ease;
            border: 0.5px solid #e2e8f0;
            /* Remove explicit min-height to allow flex scaling, rely on grid aspect */
        }

        .grid-cell:active {
            background: #e2e8f0;
        }

        .grid-cell.player-color-6 {
            background: #be185d;
        }

        .grid-cell.drawing-highlight {
            background-color: rgba(59, 130, 246, 0.6) !important;
            color: white;
            transform: scale(1.1);
            transition: transform 0.1s ease;
        }

        .grid-cell.found {
            background: #86efac;
            color: #166534;
        }

        /* Per-player colors for found cells and words */
        .player-color-0 {
            background: #60a5fa !important;
            color: #1e3a5f !important;
            border-color: #60a5fa !important;
        }

        .player-color-1 {
            background: #f472b6 !important;
            color: #4a1942 !important;
            border-color: #f472b6 !important;
        }

        .player-color-2 {
            background: #a78bfa !important;
            color: #2e1065 !important;
            border-color: #a78bfa !important;
        }

        .player-color-3 {
            background: #fb923c !important;
            color: #4a2006 !important;
            border-color: #fb923c !important;
        }

        .player-color-4 {
            background: #34d399 !important;
            color: #064e3b !important;
            border-color: #34d399 !important;
        }

        .player-color-5 {
            background: #facc15 !important;
            color: #422006 !important;
            border-color: #facc15 !important;
        }

        .player-color-6 {
            background: #f87171 !important;
            color: #450a0a !important;
            border-color: #f87171 !important;
        }

        .grid-label {
            position: absolute;
            font-size: 8px;
            color: #64748b;
            top: 0;
            left: 1px;
        }

        #grid-container {
            /* REMOVED flex: 1 to prevent huge gap */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            overflow-y: visible;
            /* Allow natural flow */
            overflow-x: hidden;
            padding: 10px;
            max-width: 100vw;
            margin: 0 auto;
            width: 100%;
            transform: rotate(0deg);
            transition: transform 0.5s ease;
        }

        #grid-container.hidden {
            display: none;
        }

        #waiting-message {
            color: white;
            text-align: center;
            font-size: 24px;
            padding: 20px;
            font-weight: bold;
            flex: 1;
            /* Expand to fill space */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            padding: 6px;
            max-width: 100%;
            order: 2;
        }

        .word-item {
            background: #f1f5f9;
            color: #1e293b;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #cbd5e1;
        }

        .word-item.found {
            background: #86efac;
            color: #166534;
            text-decoration: line-through;
            border-color: #86efac;
        }

        /* Per-player word item colors inherit from player-color-N */
        .word-item.player-color-0,
        .word-item.player-color-1,
        .word-item.player-color-2,
        .word-item.player-color-3,
        .word-item.player-color-4,
        .word-item.player-color-5,
        .word-item.player-color-6 {
            text-decoration: line-through;
        }

        /* Stall Effects */
        .stall-overlay {
            display: none !important; /* disabled for remote play */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            /* BY DEFAULT, let clicks pass through. We will enable it per-effect if needed. */
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .stall-overlay.active {
            pointer-events: auto;
        }

        .stall-overlay.hidden {
            display: none;
            pointer-events: none;
        }

        #snow-text.hidden {
            display: none !important;
            pointer-events: none;
        }

        #snow-canvas.hidden {
            display: none !important;
            pointer-events: none;
        }

        #snow-canvas {
            display: none !important; /* disabled for remote play */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            cursor: crosshair;
            opacity: 1;
            transition: opacity 0.5s;
            pointer-events: none;
            /* Default pass through */
        }

        #snow-canvas.active {
            pointer-events: auto;
            /* Catch touches when snowy */
        }

        #glass-overlay {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #1e293b;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        }

        #glass-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10001;
            pointer-events: none;
            /* Let clicks pass through to the overlay listener */
        }

        #grid-container.upside-down {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- Join Screen -->
        <div id="join-screen" class="screen active">
            <div class="join-content">
                <h1>🎮 Join Game</h1>
                <p id="host-name-display" style="display:none;margin:0 0 8px;font-size:13px;color:#94a3b8;text-align:center;"></p>
                <input type="text" id="username-input" placeholder="Enter your name" maxlength="15" autocomplete="off">
                <div>
                    <h2>Choose Avatar</h2>

                    <!-- Camera Section -->
                    <div class="camera-section">
                        <input type="file" id="camera-input" accept="image/*" capture="user" style="display: none;">

                        <div id="camera-btn" class="camera-circle-btn">
                            <span style="font-size: 32px;">📷</span>
                        </div>
                        <div class="camera-label">Take a Picture</div>
                    </div>

                    <p class="avatar-hint">...or pick an avatar below if you're shy!</p>

                    <!-- Avatar Slider Wrapper -->
                    <div class="avatar-slider-container">
                        <button class="nav-arrow left" id="nav-left">❮</button>
                        <div class="avatar-grid" id="avatar-grid">
                            <!-- Avatars populated here -->
                        </div>
                        <button class="nav-arrow right" id="nav-right">❯</button>
                    </div>
                </div>
                <div class="join-button-container">
                    <button id="join-btn">JOIN GAME</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Stall Overlays -->
            <canvas id="snow-canvas" class="hidden"></canvas>
            <div id="snow-text" class="hidden"
                style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: bold; color: #1e293b; text-shadow: 0 0 10px white, 0 0 20px white; z-index: 10002; pointer-events: none; text-align: center; width: 100%; transition: opacity 0.5s;">
                ❄️ Swipe to clear snow ❄️
            </div>
            <div id="glass-overlay" class="stall-overlay hidden">
                <canvas id="glass-canvas"></canvas>
                <div
                    style="font-size: 48px; margin-bottom: 20px; z-index: 10002; position: relative; pointer-events: none;">
                    🔨</div>
                <div style="z-index: 10002; position: relative; pointer-events: none;">FROSTED GLASS!</div>
                <div
                    style="font-size: 16px; font-weight: normal; margin-top: 10px; color: #334155; z-index: 10002; position: relative; pointer-events: none;">
                    Tap repeatedly to break</div>
            </div>
            <div class="profile-display">
                <div style="display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;">
                    <div class="profile-img"><img id="my-avatar" src=""></div>
                    <div class="profile-name" id="my-name"
                        style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Player</div>
                </div>
                <!-- Battle Buttons -->
                <div class="battle-buttons" id="battle-buttons" style="display: none;">
                    <button class="battle-circle-btn" onclick="openTargetSelector('snow')" id="btn-effect-snow"
                        title="Send Snow">
                        ❄️<div class="effect-count" id="count-snow">1</div>
                    </button>
                    <button class="battle-circle-btn" onclick="openTargetSelector('invert')" id="btn-effect-invert"
                        title="Send Invert">
                        🙃<div class="effect-count" id="count-invert">1</div>
                    </button>
                    <button class="battle-circle-btn" onclick="openTargetSelector('glass')" id="btn-effect-glass"
                        title="Send Glass">
                        🔨<div class="effect-count" id="count-glass">1</div>
                    </button>
                </div>
            </div>

            <!-- Grid Container -->
            <div id="grid-container" class="hidden">
                <!-- Grid with coordinates -->
                <div id="grid-wrapper" style="order: 1;">
                    <!-- Grid and labels rendered here -->
                </div>

                <!-- Word List -->
                <div id="word-list">
                    <!-- Words rendered here -->
                </div>
            </div>

            <!-- Waiting Message -->
            <div id="waiting-message">
                Waiting for game to start...
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="coord-input" class="big-input" placeholder="A1" maxlength="3" autocomplete="off"
                    style="flex: 1;">
                <button id="send-btn" style="flex: 1;">SEND</button>
            </div>



            <!-- Status removed -->

            <button id="leave-btn"
                style="background: #ef4444; color: white; margin-top: 20px; font-size: 14px; padding: 10px;">
                LEAVE GAME
            </button>
        </div>

        <!-- Target Selector Modal -->
        <div id="target-modal" class="modal-overlay hidden" onclick="if(event.target === this) closeTargetSelector()">
            <div class="modal-content text-left">
                <h3 id="target-modal-title" class="modal-header">Send to...</h3>
                <div class="target-list" id="target-list">
                    <!-- Populated dynamically -->
                </div>
                <button class="close-modal-btn" onclick="closeTargetSelector()">Cancel</button>
            </div>
        </div>

    </div>

    <div id="debug-overlay">Debug Info...</div>


    <script>
        // Relay mode: connect to relay server with room code from URL path
        const _relayUrl = '%%RELAY_URL%%';
        const _roomCode = (window.location.pathname.split('/').pop() || '%%ROOM_CODE%%').toUpperCase();
        const socket = io(_relayUrl, {
            query: { room: _roomCode, role: 'player' },
            transports: ['websocket', 'polling']
        });

        // Handle room not found (session ended or invalid code)
        socket.on('room-not-found', () => {
            document.body.style.background = '#0f172a';

                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const maxSize = 150;

                    if (width > height) {
                        if (width > maxSize) {
                            height *= maxSize / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width *= maxSize / height;
                            height = maxSize;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

                    const title = document.createElement('h2');
                    title.innerText = isEnded ? '👑 FINAL RESULTS 👑' : '🏆 ROUND COMPLETE 🏆';
                    title.style.color = '#fbbf24';
                    title.style.marginBottom = '20px';
                    title.style.fontSize = '24px';
                    waitingMessage.appendChild(title);

                    if (data.scores) {
                        const scoreList = document.createElement('div');
                        scoreList.style.width = '100%';
                        scoreList.style.maxWidth = '400px';
                        scoreList.style.display = 'flex';
                        scoreList.style.flexDirection = 'column';
                        scoreList.style.gap = '10px';

                        // Convert scores object to array and sort
                        const sortedScores = Object.values(data.scores).sort((a, b) => b.score - a.score);

                        sortedScores.forEach((p, index) => {
                            const row = document.createElement('div');
                            row.style.display = 'flex';
                            row.style.alignItems = 'center';
                            row.style.background = index === 0 ? 'linear-gradient(90deg, #f59e0b, #fbbf24)' : '#334155';
                            row.style.color = index === 0 ? '#78350f' : 'white';
                            row.style.padding = '10px';
                            row.style.borderRadius = '8px';
                            row.style.fontWeight = 'bold';

                            const rank = document.createElement('div');
                            rank.innerText = `#${index + 1}`;
                            rank.style.width = '30px';

                            const avatar = document.createElement('img');
                            avatar.src = p.profilePictureUrl || '';
                            avatar.style.width = '30px';
                            avatar.style.height = '30px';
                            avatar.style.borderRadius = '50%';
                            avatar.style.marginRight = '10px';
                            avatar.style.backgroundColor = '#ccc';
                            if (!p.profilePictureUrl) avatar.style.display = 'none';

                            const name = document.createElement('div');
                            name.innerText = p.username;
                            name.style.flex = '1';
                            name.style.whiteSpace = 'nowrap';
                            name.style.overflow = 'hidden';
                            name.style.textOverflow = 'ellipsis';

                            const score = document.createElement('div');
                            score.innerText = p.score;

                            row.appendChild(rank);
                            if (p.profilePictureUrl) row.appendChild(avatar);
                            row.appendChild(name);
                            row.appendChild(score);
                            scoreList.appendChild(row);
                        });

                        waitingMessage.appendChild(scoreList);
                    } else {
                        const msg = document.createElement('div');
                        msg.innerText = "No scores available";
                        waitingMessage.appendChild(msg);
                    }

                } else {
                    waitingMessage.style.display = 'flex'; // Force flex for centering
                    waitingMessage.innerText = data.gameState === 'INTRO' ? 'GAME STARTING SOON...' : 'WAITING...';
                }
            } catch (e) {
                // const debugEl = document.getElementById('debug-overlay');
                // if (debugEl) debugEl.innerText += '\nERROR: ' + e.message;
                console.error("Grid Render Error:", e);
            }
        });

        function renderWordList(words) {
            if (!words) return;

            wordList.innerHTML = '';

            words.forEach(w => {
                const div = document.createElement('div');
                div.className = 'word-item';
                if (w.isFound) {
                    div.classList.add('found');
                    div.classList.add(getPlayerColorClass(w.foundBy));
                }
                div.innerText = w.word.toUpperCase();
                wordList.appendChild(div);
            });
        }

        function renderGrid(data) {
            if (!data || !data.grid) return;

            const grid = data.grid;
            const words = data.words;
            const cols = grid.cols;
            const rows = grid.rows;

            gridWrapper.innerHTML = '';

            // Setup wrapper grid: empty corner + cols for top labels, empty corner + rows for left labels
            gridWrapper.style.gridTemplateColumns = `auto repeat(${cols}, 1fr)`;
            gridWrapper.style.gridTemplateRows = `auto repeat(${rows}, 1fr)`;

            // Top-left corner (empty cell at position 1,1)
            const corner = document.createElement('div');
            corner.style.gridColumn = '1';
            corner.style.gridRow = '1';
            gridWrapper.appendChild(corner);

            // Column labels (A, B, C, ...) - positioned at row 1, columns 2 to cols+1
            for (let c = 0; c < cols; c++) {
                const label = document.createElement('div');
                label.className = 'coord-label coord-label-top';
                label.style.gridColumn = `${c + 2}`;
                label.style.gridRow = '1';
                label.innerText = String.fromCharCode(65 + c); // A, B, C...
                gridWrapper.appendChild(label);
            }

            // Row labels (1, 2, 3, ...) - positioned at column 1, rows 2 to rows+1
            for (let r = 0; r < rows; r++) {
                const label = document.createElement('div');
                label.className = 'coord-label coord-label-left';
                label.style.gridColumn = '1';
                label.style.gridRow = `${r + 2}`;
                label.innerText = `${r + 1}`; // 1, 2, 3...
                gridWrapper.appendChild(label);
            }

            // Map found cells -> player who found them
            const foundCells = {}; // key -> foundBy username
            if (words) {
                words.forEach(w => {
                    if (w.isFound && w.startPos && w.endPos) {
                        const dr = Math.sign(w.endPos.row - w.startPos.row);
                        const dc = Math.sign(w.endPos.col - w.startPos.col);
                        const steps = Math.max(Math.abs(w.endPos.row - w.startPos.row), Math.abs(w.endPos.col - w.startPos.col));

                        let r = w.startPos.row;
                        let c = w.startPos.col;
                        for (let i = 0; i <= steps; i++) {
                            foundCells[`${r},${c}`] = w.foundBy || null;
                            r += dr;
                            c += dc;
                        }
                    }
                });
            }

            // Render grid cells directly into wrapper (not into a separate game-grid div)
            // Each cell positioned at column c+2, row r+2
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const char = grid.cells[r][c];
                    const div = document.createElement('div');

                    div.className = 'grid-cell';
                    div.setAttribute('data-row', r);
                    div.setAttribute('data-col', c);
                    const cellKey = `${r},${c}`;
                    if (cellKey in foundCells) {
                        div.classList.add('found');
                        div.classList.add(getPlayerColorClass(foundCells[cellKey]));
                    }
                    div.innerText = char;

                    // Position this cell at the correct grid position
                    div.style.gridColumn = `${c + 2}`;
                    div.style.gridRow = `${r + 2}`;

                    div.onclick = () => {
                        const letter = String.fromCharCode(65 + c);
                        const num = r + 1;
                        coordInput.value = `${letter}${num}`;
                    };

                    gridWrapper.appendChild(div);
                }
            }
        }

        // --- DRAWING LOGIC ---
        function getCellFromTouch(touch) {
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('grid-cell')) {
                return {
                    row: parseInt(el.getAttribute('data-row')),
                    col: parseInt(el.getAttribute('data-col')),
                    el: el
                };
            }
            return null;
        }

        function updateDrawingSelection(currentCell) {
            currentSelection.forEach(c => c.el.classList.remove('drawing-highlight'));
            currentSelection = [];

            const dr = currentCell.row - drawStartCell.row;
            const dc = currentCell.col - drawStartCell.col;
            const absDr = Math.abs(dr);
            const absDc = Math.abs(dc);

            if (absDr !== 0 && absDc !== 0 && absDr !== absDc) {
                currentSelection = [drawStartCell];
                drawStartCell.el.classList.add('drawing-highlight');
                return;
            }

            const steps = Math.max(absDr, absDc);
            const stepR = dr === 0 ? 0 : dr / absDr;
            const stepC = dc === 0 ? 0 : dc / absDc;

            for (let i = 0; i <= steps; i++) {
                const r = drawStartCell.row + stepR * i;
                const c = drawStartCell.col + stepC * i;
                const el = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${c}"]`);
                if (el) {
                    currentSelection.push({ row: r, col: c, el: el });
                    el.classList.add('drawing-highlight');
                }
            }
        }

        function handleDrawStart(e) {
            // Unify touch and mouse
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Find element at point (because mouse/touch might not hit a specific child if not accurate)
            const targetEl = document.elementFromPoint(clientX, clientY);
            if (!targetEl || !targetEl.classList.contains('grid-cell')) return;

            const cell = getCellFromTouch({ clientX, clientY }); // We can reuse getCellFromTouch by passing a mock touch object
            if (cell) {
                isDrawingMode = true;
                drawStartCell = cell;
                currentSelection = [cell];
                cell.el.classList.add('drawing-highlight');
                // Prevent default on touch to stop scrolling, but allow mouse default if needed (though usually we prevent it to stop text selection)
                if (e.touches) e.preventDefault();
            }
        }

        function handleDrawMove(e) {
            if (!isDrawingMode || !drawStartCell) return;
            if (e.touches) e.preventDefault();

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const cell = getCellFromTouch({ clientX, clientY });
            if (cell) {
                updateDrawingSelection(cell);
            }
        }

        function handleDrawEnd(e) {
            if (!isDrawingMode) return;
            isDrawingMode = false;

            if (currentSelection.length > 1) {
                const start = currentSelection[0];
                const letter = String.fromCharCode(65 + start.col);
                const num = start.row + 1;
                coordInput.value = `${letter}${num}`;
                sendGuess();
            } else if (currentSelection.length === 1) {
                const start = currentSelection[0];
                const letter = String.fromCharCode(65 + start.col);
                const num = start.row + 1;
                coordInput.value = `${letter}${num}`;
            }

            currentSelection.forEach(c => c.el.classList.remove('drawing-highlight'));
            currentSelection = [];
            drawStartCell = null;
        }

        gridWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return;
            handleDrawStart(e);
        }, { passive: false });
        gridWrapper.addEventListener('touchmove', handleDrawMove, { passive: false });
        gridWrapper.addEventListener('touchend', handleDrawEnd);
        gridWrapper.addEventListener('touchcancel', handleDrawEnd);

        // Desktop mouse support for testing drawing
        gridWrapper.addEventListener('mousedown', handleDrawStart);
        gridWrapper.addEventListener('mousemove', handleDrawMove);
        window.addEventListener('mouseup', handleDrawEnd); // Bind to window so dragging outside grid releases


        // --- STALL EFFECTS LOGIC ---
        const snowCanvas = document.getElementById('snow-canvas');
        const snowCtx = snowCanvas.getContext('2d');
        const glassOverlay = document.getElementById('glass-overlay');
        const glassCanvas = document.getElementById('glass-canvas');
        const glassCtx = glassCanvas.getContext('2d');

        let snowHealth = 0;
        let glassHealth = 0;
        let maxGlassHealth = 10;
        let snowActive = false;
        let glassActive = false;
        let invertEndTime = 0;
        let invertTimeout = null;

        function initGlassCanvas() {
            glassCanvas.width = window.innerWidth;
            glassCanvas.height = window.innerHeight;
            glassCtx.clearRect(0, 0, glassCanvas.width, glassCanvas.height);
            glassCtx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            glassCtx.lineWidth = 2;
            glassCtx.lineCap = 'round';
            glassCtx.lineJoin = 'round';
        }

        function drawCrack(x, y, intensity) {
            const numBranches = Math.floor(Math.random() * 3) + 2 + Math.floor(intensity / 2);
            for (let i = 0; i < numBranches; i++) {
                drawCrackBranch(x, y, Math.random() * Math.PI * 2, intensity * 20, intensity);
            }
        }

        function drawCrackBranch(startX, startY, angle, length, depth) {
            if (depth <= 0 || length <= 5) return;

            glassCtx.beginPath();
            glassCtx.moveTo(startX, startY);

            // Wobble the line a bit
            const endX = startX + Math.cos(angle) * length;
            const endY = startY + Math.sin(angle) * length;

            // Add slight randomness to the path
            const midX = (startX + endX) / 2 + (Math.random() - 0.5) * 10;
            const midY = (startY + endY) / 2 + (Math.random() - 0.5) * 10;

            glassCtx.quadraticCurveTo(midX, midY, endX, endY);
            glassCtx.stroke();

            // Spawn sub-branches randomly
            if (Math.random() > 0.4) {
                const subAngle1 = angle + (Math.random() * 1.5 - 0.75);
                drawCrackBranch(endX, endY, subAngle1, length * (Math.random() * 0.5 + 0.3), depth - 1);
            }
            if (Math.random() > 0.7) {
                const subAngle2 = angle + (Math.random() * 1.5 - 0.75);
                drawCrackBranch(endX, endY, subAngle2, length * (Math.random() * 0.5 + 0.3), depth - 1);
            }
        }

        function initSnowCanvas() {
            // Match canvas size to physical display size
            snowCanvas.width = window.innerWidth;
            snowCanvas.height = window.innerHeight;

            // Fill with pure white snow
            snowCtx.fillStyle = '#ffffff';
            snowCtx.fillRect(0, 0, snowCanvas.width, snowCanvas.height);

            // Prepare context for erasing
            snowCtx.lineJoin = 'round';
            snowCtx.lineCap = 'round';
            snowCtx.lineWidth = 60; // Size of the "finger"
            snowCtx.globalCompositeOperation = 'destination-out'; // This makes drawing erase
        }

        socket.on('stall-effect', (data) => {
            // Ignore if the target isn't us or 'all'
            if (data.target !== 'all' && data.target !== myUsername) return;

            console.log("Received stall effect:", data.effect);

            if (data.effect === 'snow') {
                snowHealth = 100;
                snowActive = true;
                snowCanvas.classList.remove('hidden');
                snowCanvas.classList.add('active'); // Enable pointer events
                snowCanvas.style.opacity = '1';

                const snowText = document.getElementById('snow-text');
                snowText.classList.remove('hidden');
                snowText.style.opacity = '1';

                initSnowCanvas();
            } else if (data.effect === 'invert') {
                const now = Date.now();
                // Stack the duration: add 5 seconds to whatever time is remaining
                invertEndTime = Math.max(now, invertEndTime) + 5000;

                gridContainer.classList.add('upside-down');

                if (invertTimeout) clearTimeout(invertTimeout);
                invertTimeout = setTimeout(() => {
                    gridContainer.classList.remove('upside-down');
                    invertEndTime = 0;
                }, invertEndTime - now);
            } else if (data.effect === 'glass') {
                if (glassHealth === 0) {
                    // Completely fresh glass
                    maxGlassHealth = 10;
                    glassHealth = maxGlassHealth;
                    glassActive = true;
                    glassOverlay.classList.remove('hidden');
                    glassOverlay.classList.add('active'); // Catch clicks
                    initGlassCanvas();
                } else {
                    // Stack health
                    glassHealth += 10;
                    maxGlassHealth += 10;
                }

                glassOverlay.style.opacity = '1';
                // Enforce maximum initial blur
                const blurAmount = Math.min(30, (glassHealth / 10) * 15);
                glassOverlay.style.backdropFilter = `blur(${blurAmount}px)`;
                glassOverlay.style.webkitBackdropFilter = `blur(${blurAmount}px)`;
            }
        });

        // Window resize handler to maintain snow/glass overlay size
        window.addEventListener('resize', () => {
            if (snowActive) {
                initSnowCanvas();
            }
            if (glassActive) {
                initGlassCanvas();
                // We lose cracks on resize, but better than stretching wildly
            }
        });

        // Snow Swiping (Scratch-off technique)
        let isSnowErasing = false;

        function getCanvasPos(e) {
            const rect = snowCanvas.getBoundingClientRect();
            // Use touch coordinates or mouse coordinates
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function checkSnowCleared() {
            // Performance check: Sample the canvas to see how much is cleared
            // We sample a grid of points to avoid checking every single pixel
            const width = snowCanvas.width;
            const height = snowCanvas.height;
            const stride = 50;
            let opaquePoints = 0;
            let totalPoints = 0;

            // Get image data (expensive, don't do this every frame)
            const imageData = snowCtx.getImageData(0, 0, width, height).data;

            for (let y = 0; y < height; y += stride) {
                for (let x = 0; x < width; x += stride) {
                    const alphaIndex = (y * width + x) * 4 + 3;
                    if (imageData[alphaIndex] > 128) opaquePoints++;
                    totalPoints++;
                }
            }

            const percentCleared = 1 - (opaquePoints / totalPoints);

            // If more than 20% of the screen is cleared, end the effect
            if (percentCleared > 0.2) {
                snowActive = false;
                snowCanvas.classList.remove('active'); // Let clicks through instantly
                snowCanvas.style.opacity = '0';

                const snowText = document.getElementById('snow-text');
                snowText.style.opacity = '0';

                setTimeout(() => {
                    snowCanvas.classList.add('hidden');
                    snowText.classList.add('hidden');
                    // Reset blending mode just in case
                    snowCtx.globalCompositeOperation = 'source-over';
                }, 500); // Wait for fade transition
            }
        }

        // Shared start function
        function handleEraseStart(e) {
            if (!snowActive) return;
            e.preventDefault(); // Stop scrolling while erasing
            isSnowErasing = true;

            const pos = getCanvasPos(e);
            snowCtx.beginPath();
            snowCtx.moveTo(pos.x, pos.y);
        }

        // Shared move function
        function handleEraseMove(e) {
            if (!isSnowErasing || !snowActive) return;
            e.preventDefault();

            const pos = getCanvasPos(e);
            snowCtx.lineTo(pos.x, pos.y);
            snowCtx.stroke();
        }

        // Shared end function
        function handleEraseEnd() {
            if (!isSnowErasing) return;
            isSnowErasing = false;
            // Check if enough snow is removed to clear the whole effect
            if (snowActive) {
                checkSnowCleared();
            }
        }

        // Attach both Touch and Mouse listeners for testing
        snowCanvas.addEventListener('touchstart', handleEraseStart, { passive: false });
        snowCanvas.addEventListener('touchmove', handleEraseMove, { passive: false });
        snowCanvas.addEventListener('touchend', handleEraseEnd);
        snowCanvas.addEventListener('touchcancel', handleEraseEnd);

        snowCanvas.addEventListener('mousedown', handleEraseStart);
        snowCanvas.addEventListener('mousemove', handleEraseMove);
        snowCanvas.addEventListener('mouseup', handleEraseEnd);
        snowCanvas.addEventListener('mouseleave', handleEraseEnd);

        // Glass Tapping
        function handleGlassTap(e) {
            if (glassHealth <= 0 || !glassActive) return;
            if (e.touches) e.preventDefault();

            glassHealth -= 1;

            // Draw a crack where tapped
            const rect = glassOverlay.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const tapX = clientX - rect.left;
            const tapY = clientY - rect.top;

            // The closer to 0 health, the bigger the crack
            const crackIntensity = Math.max(1, Math.ceil((1 - (glassHealth / maxGlassHealth)) * 5));
            drawCrack(tapX, tapY, crackIntensity);

            // Visual feedback (cracks/blur reduction)
            const blurAmount = Math.max(0, (glassHealth / maxGlassHealth) * 15);
            glassOverlay.style.backdropFilter = `blur(${blurAmount}px)`;
            glassOverlay.style.webkitBackdropFilter = `blur(${blurAmount}px)`;

            if (glassHealth <= 0) {
                glassActive = false;
                glassOverlay.classList.remove('active'); // Let clicks pass immediately

                // Final shatter effect - draw a ton of cracks instantly before fading
                for (let i = 0; i < 5; i++) {
                    drawCrack(glassCanvas.width / 2 + (Math.random() - 0.5) * 100, glassCanvas.height / 2 + (Math.random() - 0.5) * 100, 6);
                }

                glassOverlay.style.transition = 'opacity 0.4s ease-out';
                glassOverlay.style.opacity = '0';

                setTimeout(() => {
                    glassOverlay.classList.add('hidden');
                    glassOverlay.style.transition = ''; // Reset
                }, 400);
            }
        }

        glassOverlay.addEventListener('touchstart', handleGlassTap, { passive: false });
        glassOverlay.addEventListener('mousedown', handleGlassTap);
    </script>
